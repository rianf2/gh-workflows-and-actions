name: CI

env:
  MEME: 67

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:
    inputs:
      environment:
        description: Choose what to do with this workflow
        required: true
        default: Run the C++ executable
        type: choice
        options:
        - Run the C++ executable
        - Run the Python unittest

jobs:
  do-meme:
    runs-on: ubuntu-latest
    steps:
      - name: What is a good number?
        run: echo "$MEME"

  github-vars:
    needs: do-meme
    runs-on: ubuntu-latest
    steps:
      - name: Print variables
        run: |
             echo -e 'CI: ' $CI
             echo -e 'GITHUB_ACTION: ' $GITHUB_ACTION
             echo -e 'GITHUB_ACTION_PATH: ' $GITHUB_ACTION_PATH
             echo -e 'GITHUB_ACTION_REPOSITORY: ' $GITHUB_ACTION_REPOSITORY
             echo -e 'GITHUB_ACTIONS: ' $GITHUB_ACTIONS
             echo -e 'GITHUB_ACTOR: ' $GITHUB_ACTOR
             echo -e 'GITHUB_ACTOR_ID: ' $GITHUB_ACTOR_ID
             echo -e 'GITHUB_API_URL'$GITHUB_API_URL


  cpp-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name:  Build C++
        run: |
          g++ main.cpp -o main
          ls -al main
  
  run:
    needs: cpp-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Do something
        run: |
             echo 'Run selected choice'
             if [[ "${{ inputs.environment }}" == "Run the C++ executable" ]]; then
               g++ main.cpp -o main
               ./main
             else
               python -m unittest -v main.py
             fi

  end-run:
    runs-on: ubuntu-latest
    needs: [github-vars, run]
    steps:
      - name: Goodbye
        run: echo "Goodbye world!"
        
