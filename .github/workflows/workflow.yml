# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      choice:
        type: choice
        description: Choose what to do with this workflow
        options:
        - Run the C++ executable
        - Run the Python unittest

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: github.event.input.choice
        run: |
             if [[ $"{{github.event.input.choice}}" == "Run the C++ executable" ]]; then
               g++ main.cpp -o main
               ./main
             else
               python -m unittest -v main.py
             fi

      - name: List all Github variables
        run: |
             echo -e 'CI: ' $CI
             echo -e 'GITHUB_ACTION: ' $GITHUB_ACTION
             echo -e 'GITHUB_ACTION_PATH: ' $GITHUB_ACTION_PATH
             echo -e 'GITHUB_ACTION_REPOSITORY: ' $GITHUB_ACTION_REPOSITORY
             echo -e 'GITHUB_ACTIONS: ' $GITHUB_ACTIONS
             echo -e 'GITHUB_ACTOR: ' $GITHUB_ACTOR
             echo -e 'GITHUB_ACTOR_ID: ' $GITHUB_ACTOR_ID
             echo -e 'GITHUB_API_URL'$GITHUB_API_URL
